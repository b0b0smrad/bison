---
- name: Arch-post-install-setup
  hosts: localhost
  connection: local
  become: true

  vars:
    user: "{{ lookup('env', 'USER') }}"
  # tasks:
  #
  #   - name: install base and important packages
  #     pacman:
  #       name:
  #         - base
  #         - base-devel
  tasks:
    - name: Install packages
      community.general.pacman:
        name:
          - 7zip
          - alacritty
          - alsa-utils
          - amd-ucode
          - amdgpu_top
          - ansible
          - ansible-core
          - ansible-language-server
          - ansible-lint
          - arandr
          - archinstall
          - base
          - base-devel
          - bat
          - bitwarden
          - btop
          - calibre
          - chromium
          - clipmenu
          - clipnotify
          - cpupower
          - cups
          - discord
          - dosbox
          - dotnet-runtime-8.0
          - dunst
          - dust
          - easyeffects
          - efibootmgr
          - fastfetch
          - fbreader
          - feh
          - fio
          - firefox
          - flameshot
          - flatpak
          - fzf
          - gdb
          - git
          - git-lfs
          - go
          - grub
          - gvfs
          - gvfs-smb
          - hip-runtime-amd
          - htop
          - i3-wm
          - i3blocks
          - i3lock
          - i3status
          - iftop
          - iwd
          - jellyfin-web
          - jre21-openjdk
          - krita
          - less
          - lib32-vulkan-radeon
          - libc++
          - libxinerama
          - lightdm
          - linux-firmware
          - linux-zen
          - linux-zen-headers
          - luarocks
          - lsp-plugins
          - lxinput
          - man-db
          - mpv
          - neovim
          - npm
          - ntfs-3g
          - nvtop
          - obsidian
          - os-prober
          - pavucontrol
          - pcsclite
          - picom
          - pipewire
          - pipewire-audio
          - pipewire-docs
          - pipewire-jack
          - pipewire-pulse
          - pipewire-zeroconf
          - qbittorrent
          - radeontool
          - radeontop
          - reaper
          - renderdoc
          - ripgrep
          - rocm-opencl-runtime
          - rocm-smi-lib
          - rofi
          - rsync
          - sane
          - sddm
          - smartmontools
          - smb4k
          - smbnetfs
          - steam
          - sudo
          - sws
          - sxiv
          - syncthing
          - systemd-resolvconf
          - tailscale
          - tree-sitter
          - termdown
          - thunar
          - thunar-archive-plugin
          - thunar-media-tags-plugin
          - thunar-shares-plugin
          - thunar-volman
          - thunderbird
          - tmux
          - ttf-nerd-fonts-symbols
          - ttf-nerd-fonts-symbols-common
          - unrar
          - unzip
          - upower
          - vim
          - virtualbox
          - vulkan-radeon
          - wget
          - wine
          - wine-gecko
          - wine-mono
          - wiremix
          - wireplumber
          - wireplumber-docs
          - wsdd
          - xclip
          - xdg-desktop-portal
          - xdg-desktop-portal-gtk
          - xdg-desktop-portal-wlr
          - xf86-input-wacom
          - xf86-video-amdgpu
          - xorg-server
          - xorg-xev
          - xorg-xinit
          - xorg-xinput
          - xorg-xprop
          - xorg-xrandr
          - xorg-xsetroot
          - xorg-xwayland
          - xterm
          - zathura
          - zathura-pdf-poppler
          - zathura-ps
          - zig
          - zip
          - zsh
        state: present

    - name: Enable pipewire (user)
      become: false
      ansible.builtin.systemd:
        name: pipewire
        scope: user
        enabled: true

    - name: Git pull DWM
      become: false
      ansible.builtin.git:
        repo: https://github.com/b0b0smrad/DWM.git
        dest: "/home/{{ user }}/.config/dwm"
        update: yes

    - name: Build dwm
      become: false
      command:
        bash auto_restart.sh
      args:
        chdir: "/home/{{ user }}/.config/dwm"
        creates: "/usr/local/bin/dwm"

    - name: Install oh-my-zsh
      become: false
      ansible.builtin.shell: |
        sh -c "$(wget https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh -O -)" "" --unattended
